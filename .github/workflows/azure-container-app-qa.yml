---
trigger:
  - qa
variables:
  azureSubscription: ARM-SC-QA
  dockerRegistryServiceConnection: DR-SC-QA
  resourceGroup: thub-qa
  acrName: thubqa
  containerAppName: thub-app
  imageName: thub-app
  tag: $(Build.BuildId)
pool:
  vmImage: ubuntu-latest
stages:
  - stage: BuildAndDeploy
    displayName: Build and Deploy to Azure Container Apps (QA)
    jobs:
      - job: Build
        displayName: Build & Deploy
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: Azure Login
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az account show
          - task: Docker@2
            displayName: Build and Push Image
            inputs:
              command: buildAndPush
              repository: $(imageName)
              dockerfile: Dockerfile
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
          - task: AzureCLI@2
            displayName: Deploy to Azure Container App
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: >
                set -e


                echo "Installing containerapp extension..."

                az extension add --name containerapp --upgrade -y


                echo "Registering Microsoft.App provider..."

                az provider register --namespace Microsoft.App


                echo "Validating Container App exists..."

                az containerapp show \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup)

                IMAGE="$(acrName).azurecr.io/$(imageName):$(tag)"

                echo "Deploying image: ${IMAGE}"


                az containerapp update \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --image "${IMAGE}" \
                  --set-env-vars \
                    AZURE_GOOGLE_CLIENT_ID=$(AZURE_GOOGLE_CLIENT_ID) \
                    AZURE_GOOGLE_CLIENT_SECRET=$(AZURE_GOOGLE_CLIENT_SECRET) \
                    AZURE_GITHUB_CLIENT_ID_APP=$(AZURE_GITHUB_CLIENT_ID_APP) \
                    AZURE_GITHUB_CLIENT_SECRET_APP=$(AZURE_GITHUB_CLIENT_SECRET_APP) \
                    AZURE_GITHUB_CLIENT_ID_DEMO=$(AZURE_GITHUB_CLIENT_ID_DEMO) \
                    AZURE_GITHUB_CLIENT_SECRET_DEMO=$(AZURE_GITHUB_CLIENT_SECRET_DEMO) \
                    AZURE_GITHUB_CLIENT_ID_LOCAL=$(AZURE_GITHUB_CLIENT_ID_LOCAL) \
                    AZURE_GITHUB_CLIENT_SECRET_LOCAL=$(AZURE_GITHUB_CLIENT_SECRET_LOCAL) \
                    AZURE_GITHUB_VITE_GOOGLE_CLIENT_ID=$(AZURE_GITHUB_VITE_GOOGLE_CLIENT_ID) \
                    AZURE_VITE_GITHUB_CLIENT_ID=$(AZURE_VITE_GITHUB_CLIENT_ID)

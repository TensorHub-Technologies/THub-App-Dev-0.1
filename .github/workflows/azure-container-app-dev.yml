trigger:
    - Dev

variables:
    # Azure Resource Manager service connection (used by AzureCLI@2)
    azureSubscription: ARMSC # <-- ARM service connection name

    # Docker Registry service connection (used by Docker@2)
    dockerRegistryServiceConnection: DockerSC # <-- Docker Registry service connection name

    resourceGroup: thub-dev
    acrName: thubdev # ACR name (not FQDN)
    containerAppName: thub-app
    imageName: thub-app
    tag: $(Build.BuildId)

pool:
    vmImage: ubuntu-latest

stages:
    - stage: BuildAndDeploy
      displayName: Build and Deploy to Azure Container Apps (Dev)
      jobs:
          - job: Build
            displayName: Build & Deploy
            steps:
                - checkout: self

                # Azure login (ARM service connection)
                - task: AzureCLI@2
                  displayName: Azure Login
                  inputs:
                      azureSubscription: $(azureSubscription)
                      scriptType: bash
                      scriptLocation: inlineScript
                      inlineScript: |
                          az account show

                # Build & push via Docker task using Docker Registry service connection
                - task: Docker@2
                  displayName: Build and Push Image
                  inputs:
                      command: buildAndPush
                      repository: $(imageName)
                      dockerfile: Dockerfile
                      containerRegistry: $(dockerRegistryServiceConnection) # <-- service connection NAME
                      tags: |
                          $(tag)

                # Deploy the newly pushed image to Container Apps using ARM service connection
                - task: AzureCLI@2
                  displayName: Deploy to Container App
                  inputs:
                      azureSubscription: $(azureSubscription)
                      scriptType: bash
                      scriptLocation: inlineScript
                      inlineScript: |
                          set -e
                          IMAGE="$(acrName).azurecr.io/$(imageName):$(tag)"
                          echo "Deploying image: ${IMAGE}"

                          az containerapp update \
                            --name $(containerAppName) \
                            --resource-group $(resourceGroup) \
                            --image "${IMAGE}" \
                            --set-env-vars \
                              AZURE_GOOGLE_CLIENT_ID=$(AZURE_GOOGLE_CLIENT_ID) \
                              AZURE_GOOGLE_CLIENT_SECRET=$(AZURE_GOOGLE_CLIENT_SECRET) \
                              AZURE_GITHUB_CLIENT_ID_APP=$(AZURE_GITHUB_CLIENT_ID_APP) \
                              AZURE_GITHUB_CLIENT_SECRET_APP=$(AZURE_GITHUB_CLIENT_SECRET_APP) \
                              AZURE_GITHUB_CLIENT_ID_DEMO=$(AZURE_GITHUB_CLIENT_ID_DEMO) \
                              AZURE_GITHUB_CLIENT_SECRET_DEMO=$(AZURE_GITHUB_CLIENT_SECRET_DEMO) \
                              AZURE_GITHUB_CLIENT_ID_LOCAL=$(AZURE_GITHUB_CLIENT_ID_LOCAL) \
                              AZURE_GITHUB_CLIENT_SECRET_LOCAL=$(AZURE_GITHUB_CLIENT_SECRET_LOCAL) \
                              AZURE_GITHUB_VITE_GOOGLE_CLIENT_ID=$(AZURE_GITHUB_VITE_GOOGLE_CLIENT_ID) \
                              AZURE_VITE_GITHUB_CLIENT_ID=$(AZURE_VITE_GITHUB_CLIENT_ID)

name: Trigger auto deployment for thub-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ Dev ]
    paths:
    - '**'
    - '.github/workflows/thub-app-AutoDeployTrigger-fd09bc60-357c-4a7b-868f-568e71412953.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.THUBAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.THUBAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.THUBAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.THUBAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.THUBAPP_REGISTRY_PASSWORD }}
          containerAppName: thub-app
          resourceGroup: thub-dev
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_



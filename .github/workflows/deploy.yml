name: Build and Deploy to GKE

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}
  DEPLOYMENT_NAME: ${{ secrets.DEPLOYMENT_NAME }}
  IMAGE: thub-app
  REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GKE_PROJECT }}/thub-app

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Setup gcloud CLI with Workload Identity
    - uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GKE_SA_KEY }}

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    # Configure Docker to authenticate with Artifact Registry
    - run: |-
        gcloud auth configure-docker us-central1-docker.pkg.dev

    # Get the GKE credentials so we can deploy
    - uses: google-github-actions/get-gke-credentials@v1
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }}

    # Build the Docker image
    - name: Build
      run: |-
        docker build -t "$REGISTRY/$IMAGE:$GITHUB_SHA" .
    
    # Push the Docker image to Artifact Registry
    - name: Publish
      run: |-
        docker push "$REGISTRY/$IMAGE:$GITHUB_SHA"

    # Deploy the Docker image to the GKE cluster
    - name: Deploy
      run: |-
        kubectl set image deployment/$DEPLOYMENT_NAME $DEPLOYMENT_NAME="$REGISTRY/$IMAGE:$GITHUB_SHA"
        kubectl rollout status deployment/$DEPLOYMENT_NAME
